name: Release - Build, Push, and Publish From Tag

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set Release Tag
        run: echo "release_tag=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"

      - name: Authenticate to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set Up QEMU for Multi-Architecture Builds
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Set Up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: booklore-ui/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./booklore-ui
        run: npm ci

      - name: Audit Frontend Dependencies
        working-directory: ./booklore-ui
        run: npm audit --audit-level=high

      - name: Validate Dependency Tree
        working-directory: ./booklore-ui
        run: npm ls --depth=0

      - name: Build Angular App
        working-directory: ./booklore-ui
        run: npx ng build --configuration=production

      - name: Set Up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: gradle

      - name: Copy Angular Dist to Spring Boot Resources
        run: cp -r booklore-ui/dist/booklore/browser/. booklore-api/src/main/resources/static/

      - name: Inject Version into application.yaml
        env:
          APP_VERSION: ${{ env.release_tag }}
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.52.2/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq eval '.app.version = strenv(APP_VERSION)' -i booklore-api/src/main/resources/application.yaml

      - name: Build Spring Boot JAR
        working-directory: ./booklore-api
        run: ./gradlew clean build -x test --no-daemon --parallel --build-cache

      - name: Build and push Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile.ci
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/faustvii/booklore:${{ env.release_tag }}
            ghcr.io/faustvii/booklore:latest
          build-args: |
            APP_VERSION=${{ env.release_tag }}
            APP_REVISION=${{ github.sha }}
          cache-from: |
            type=gha
            type=registry,ref=ghcr.io/faustvii/booklore:buildcache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=ghcr.io/faustvii/booklore:buildcache,mode=max

      - name: Publish Draft Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ env.release_tag }}
        run: |
          set -euo pipefail

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            is_draft="$(gh release view "${RELEASE_TAG}" --json isDraft --jq '.isDraft')"
            if [ "${is_draft}" = "true" ]; then
              gh release edit "${RELEASE_TAG}" --draft=false
            else
              echo "Release ${RELEASE_TAG} is already published."
            fi
          else
            gh release create "${RELEASE_TAG}" --title "Release ${RELEASE_TAG}" --generate-notes
          fi
